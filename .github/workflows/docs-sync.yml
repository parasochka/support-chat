name: docs-sync

# Safety net: fails if README.md ever drifts from CLAUDE.md. The pre-commit
# hook (git config core.hooksPath .githooks) keeps them in sync automatically;
# this catches commits made without the hook installed.
on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: README.md must equal CLAUDE.md
        run: |
          if ! diff -q CLAUDE.md README.md > /dev/null; then
            echo "::error::README.md is out of sync with CLAUDE.md."
            echo "Fix it by enabling the hook (git config core.hooksPath .githooks) and re-committing,"
            echo "or run: sh scripts/sync_readme.sh && git add README.md"
            diff CLAUDE.md README.md || true
            exit 1
          fi
          echo "README.md is in sync with CLAUDE.md."
