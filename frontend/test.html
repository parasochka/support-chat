<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NowPlix Support Chat — Test Page</title>
  <link rel="stylesheet" href="/widget.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial,
        sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 48px 24px; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    p { color: #94a3b8; line-height: 1.6; }
    .doc {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px 24px;
      margin-top: 24px;
      overflow-x: auto;
    }
    .doc pre {
      margin: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: "SF Mono", "Cascadia Code", "Fira Code", Menlo, Consolas,
        monospace;
      font-size: 13px;
      line-height: 1.6;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>NikaBet Support Chat — Test Page</h1>
    <p>
      This page embeds the floating support widget (bottom-right). The content
      below is the full contents of <code>CLAUDE.md</code> (kept identical to
      <code>README.md</code>), rendered live on each request.
    </p>

    <div class="doc">
      <pre><!--CLAUDE_MD_CONTENT--></pre>
    </div>
  </div>

  <!-- Widget auto-mounts on load. To override config, import { mount } instead. -->
  <script type="module" src="/widget.js"></script>
</body>
</html>
